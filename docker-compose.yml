services:
  timescaledb:
    image: timescale/timescale:latest-pg17
    container_name: timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metrics_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metrics_password}
      POSTGRES_DB: ${POSTGRES_DB:-metrics_db}
    ports:
      - "8080:80"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metrics_user} -d ${POSTGRES_DB:-metrics_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  timescaledb_data: